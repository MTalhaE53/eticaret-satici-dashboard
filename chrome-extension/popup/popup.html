<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Ticaret Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 20px;
      color: white;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header .logo {
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
    }

    .header p {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 2px;
    }

    /* ========== Oturum Açılmamış ========== */
    .login-prompt {
      padding: 40px 24px;
      text-align: center;
    }

    .login-prompt .icon-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea20, #764ba220);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px;
    }

    .login-prompt h2 {
      font-size: 16px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 8px;
    }

    .login-prompt p {
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .login-prompt .hint {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 14px;
      line-height: 1.5;
    }

    /* ========== Oturum Açılmış ========== */
    .dashboard-content {
      display: none;
    }

    .dashboard-content.visible {
      display: block;
    }

    .store-card {
      padding: 16px 20px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .store-avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      font-weight: 700;
    }

    .store-info .name {
      font-size: 14px;
      font-weight: 700;
      color: #1e293b;
    }

    .store-info .status {
      font-size: 11px;
      color: #22c55e;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }

    .store-info .status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
    }

    .sync-section {
      padding: 16px 20px;
    }

    .sync-section h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #94a3b8;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .sync-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }

    .sync-card:hover {
      border-color: #cbd5e1;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .sync-card .label {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
    }

    .sync-card .time {
      font-size: 11px;
      color: #94a3b8;
    }

    /* Butonlar */
    .actions {
      padding: 12px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-visit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-visit:hover {
      opacity: 0.9;
    }

    .btn-visit:active {
      transform: scale(0.98);
    }

    .btn-logout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px solid #fecaca;
      border-radius: 10px;
      color: #ef4444;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: #fef2f2;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo">📊</div>
    <div>
      <h1>E-Ticaret Dashboard</h1>
      <p>Satıcı Veri Senkronizasyonu</p>
    </div>
  </div>

  <!-- Oturum Açılmamış -->
  <div class="login-prompt" id="loginPrompt">
    <div class="icon-circle">🔒</div>
    <h2>Oturum Açın</h2>
    <p>Eklentiyi kullanmak için Dashboard'a giriş yapın.</p>
    <button class="btn-primary" id="btnGoLogin">Dashboard'a Git →</button>
    <p class="hint">Hesabınız yoksa ücretsiz kayıt olabilirsiniz.</p>
  </div>

  <!-- Oturum Açılmış -->
  <div class="dashboard-content" id="dashboardContent">
    <div class="store-card">
      <div class="store-avatar" id="storeAvatar">M</div>
      <div class="store-info">
        <div class="name" id="storeName">Mağazam</div>
        <div class="status"><span class="dot"></span><span>Bağlı</span></div>
      </div>
    </div>

    <div class="sync-section">
      <h2>Son Senkronizasyon</h2>
      <div class="sync-card"><span class="label">📦 Siparişler</span><span class="time" id="syncOrders">—</span></div>
      <div class="sync-card"><span class="label">⭐ Yorumlar</span><span class="time" id="syncReviews">—</span></div>
      <div class="sync-card"><span class="label">📋 Stok</span><span class="time" id="syncStock">—</span></div>
      <div class="sync-card"><span class="label">↩️ İadeler</span><span class="time" id="syncReturns">—</span></div>
    </div>

    <div class="actions">
      <button class="btn-visit" id="btnVisit">📊 Paneli Ziyaret Et</button>
      <button class="btn-logout" id="btnLogout">🚪 Çıkış Yap</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
